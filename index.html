<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xbox Style Website</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #0e0e0e;
    color: white;
}

header {
    background-color: #ff1493;
    padding: 15px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

header h1 {
    margin: 0;
}

nav a {
    color: white;
    text-decoration: none;
    margin-left: 20px;
    font-weight: bold;
}

.hero {
    text-align: center;
    padding: 100px 20px;
    background: linear-gradient(to right, #107C10, #0e0e0e);
}

.hero h2 {
    font-size: 40px;
}

.hero button {
    padding: 12px 25px;
    background-color: #ff1493;
    border: none;
    color: white;
    font-size: 18px;
    cursor: pointer;
    border-radius: 5px;
}

.games {
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 50px 20px;
}

.game-card {
    background-color: #1a1a1a;
    padding: 20px;
    border-radius: 10px;
    width: 200px;
    text-align: center;
    transition: 0.3s;
}

.game-card:hover {
    transform: scale(1.05);
    background-color: #ff1493;
}
.game-card:hover {
    box-shadow: 0 0 20px #ff1493;
}
footer {
    text-align: center;
    padding: 20px;
    background-color: #111;
}
    .game-card:hover {
    box-shadow: 0 0 20px #ff1493;
}
    .game-card {
    animation: fadeUp 0.8s ease forwards;
    opacity: 0;
}

@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>

</head>
<body>

<header>
    <h1>Bihari Xbox</h1>
    <nav>
        <a href="#">Home</a>
        <a href="#">Games</a>
        <a href="#">Game Pass</a>
        <a href="#">Support</a>
    </nav>
</header>

<section class="hero">
    <h2>Dihadi or khaini</h2>
    <p>Next-Gen Mazdoori Experience</p>
    <button>Explore Now</button>
</section>

<section class="games">
    <div class="game-card">
        
        <h3>Bihari V</h3>
        <p>Open World Majdoori</p>
        <a href="https://www.instagram.com/randiiroona?igsh=MTN6c3lueXpsNWpjYg%3D%3D&utm_source=qr" target="_blank">
    <img src="IMG_4418.jpeg" width="180">
</a>

    </div>
    <div class="game-card">
        <h3>GUTKA BOLO JUBA</h3>
        <p>Wild West Adventure</p>
    </div>
    <div class="game-card">
        <h3>Halo</h3>
        <p>Sci-Fi Shooter</p>
    </div>
</section>

<footer>
    <p>© 2026 Griffth Bihari</p>
</footer>

</body>
</html>
