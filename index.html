<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xbox Style Website</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #0e0e0e;
    color: white;
}

header {
    background-color: #107C10;
    padding: 15px 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

header h1 {
    margin: 0;
}

nav a {
    color: white;
    text-decoration: none;
    margin-left: 20px;
    font-weight: bold;
}

.hero {
    text-align: center;
    padding: 100px 20px;
    background: linear-gradient(to right, #107C10, #0e0e0e);
}

.hero h2 {
    font-size: 40px;
}

.hero button {
    padding: 12px 25px;
    background-color: #107C10;
    border: none;
    color: white;
    font-size: 18px;
    cursor: pointer;
    border-radius: 5px;
}

.games {
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 50px 20px;
}

.game-card {
    background-color: #1a1a1a;
    padding: 20px;
    border-radius: 10px;
    width: 200px;
    text-align: center;
    transition: 0.3s;
}

.game-card:hover {
    transform: scale(1.05);
    background-color: #107C10;
}

footer {
    text-align: center;
    padding: 20px;
    background-color: #111;
}
    .game-card:hover {
    box-shadow: 0 0 20px #107C10;
}
</style>

</head>
<body>

<header>
    <h1>Chut ka parinda Xbox</h1>
    <nav>
        <a href="#">Home</a>
        <a href="#">Games</a>
        <a href="#">Game Pass</a>
        <a href="#">Support</a>
    </nav>
</header>

<section class="hero">
    <h2>Power Your Dreams</h2>
    <p>Next-Gen Gaming Experience</p>
    <button>Explore Now</button>
</section>

<section class="games">
    <div class="game-card">
        <h3>RANDI V</h3>
        <p>Open World Action</p>
        <img src="IMG_4415.png" width="180">
    </div>
    <div class="game-card">
        <h3>CHUTKAPANI</h3>
        <p>Wild West Adventure</p>
    </div>
    <div class="game-card">
        <h3>Halo</h3>
        <p>Sci-Fi Shooter</p>
    </div>
</section>

<footer>
    <p>© 2026 Griffth randikhana</p>
</footer>

</body>
</html>
